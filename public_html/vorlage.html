    <body id="seitenanfang">
        
        <!-- Kopfzeile -->
        <header>
            <picture>
                <source media="(min-width: 1920px)" srcset="header1920x200.png">
    
                <source media="(min-width: 1280px)" srcset="header1280x133.png">
    
                <source media="(min-width: 640px)" srcset="header640x67.png">
    
                <img src="header320x34.png" alt="header">

        <!-- Navigation -->

                <h3>Login</h3>
                
                <!-- sendet Daten per POST -->
                <form action="ziel.html" method="POST"> 
                    
                    <!-- Beschriftung für das Benutzernamen Feld -->
                    <label for="benutzername">Benutzername:</label>
                    
                    <!-- Eingabefeld für das Benutzername Feld -->
                    <input type="text" id="benutzername" name="benutzername">
                    <br>
                    
                    <label for="passwort">Passwort:</label>
                    <input type="password" id="passwort" name="passwort">
                    <br><br>
                    
                   <!-- Button zum Absenden des Formulars -->
                    <button type="submit">Einloggen</button>
                </form>
                
                <!-- Textabsatz -->
